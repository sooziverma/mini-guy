<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Guy: Contract Deployer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --border-color: #ffffff;
            --text-color: #ffffff;
            --font-primary: 'Outfit', sans-serif;
            --font-arcade: 'Press Start 2P', monospace;
            --color-warning: #ffff00;
            --color-success: #00ff00;
            --color-danger: #ff0000;
            --color-gold: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: var(--font-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .deployer-panel {
            background: #000;
            border: 2px solid var(--border-color);
            width: 100%;
            max-width: 520px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .font-arcade {
            font-family: var(--font-arcade);
            line-height: 1.4;
        }

        .title {
            font-size: 20px;
            color: var(--color-gold);
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.3);
        }

        .subtitle {
            font-size: 10px;
            color: #888;
            margin-bottom: 24px;
        }

        .info-box {
            background: #0d0d0d;
            border: 1px dashed #333;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            color: #ccc;
            margin-bottom: 24px;
            border-radius: 4px;
        }

        .info-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .label {
            font-weight: 600;
            color: #fff;
        }

        .value {
            font-family: monospace;
            word-break: break-all;
        }

        .btn {
            border: 1px solid var(--border-color);
            background: #000;
            color: #fff;
            font-size: 10px;
            padding: 12px 24px;
            cursor: pointer;
            outline: none;
            width: 100%;
            margin-bottom: 12px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        .btn-warning {
            border-color: var(--color-warning);
            color: var(--color-warning);
        }

        .btn-warning:hover {
            background: var(--color-warning);
            color: #000;
        }

        .btn-success {
            border-color: var(--color-success);
            color: var(--color-success);
        }

        .btn-success:hover {
            background: var(--color-success);
            color: #000;
        }

        .status-message {
            margin-top: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            color: var(--color-warning);
        }

        .status-success {
            color: var(--color-success);
        }

        .status-error {
            color: var(--color-danger);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 11px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="deployer-panel">
        <h1 class="title font-arcade">BASE CONTRACT DEPLOYER</h1>
        <p class="subtitle font-arcade">DEPLOY CONTRACT FOR MINI GUY ONCHAIN</p>

        <div class="info-box">
            <div class="info-row">
                <span class="label">Target Network:</span>
                <span class="value" style="color: var(--color-warning);">Base L2 Mainnet</span>
            </div>
            <div class="info-row">
                <span class="label">Wallet Address:</span>
                <span id="wallet-address" class="value">Not Connected</span>
            </div>
            <div class="info-row">
                <span class="label">Contract Address:</span>
                <span id="contract-address" class="value">None Saved</span>
            </div>
        </div>

        <button id="btn-connect" class="btn btn-warning font-arcade">CONNECT WALLET</button>
        <button id="btn-deploy" class="btn btn-success font-arcade" style="display: none;">DEPLOY SMART CONTRACT</button>

        <div id="status-container" class="status-message font-arcade"></div>

        <a href="index.html" class="back-link font-arcade">◀ RETURN TO GAME</a>
    </div>

    <!-- Ethers v6 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
    <script>
        const contractABI = [
            "event DailyCheckInClaimed(address user, uint256 reward, uint256 streak)",
            "event ScoreSubmitted(address indexed player, uint256 score, bool isNewHighScore)",
            "function claimDailyCheckIn() external payable returns (uint256)",
            "function getLeaderboard() external view returns (tuple(address player, uint256 score)[10])",
            "function getPlayerState(address account) external view returns (uint256 coinBalance, uint256 streak, uint256 lastClaimTime, uint256 highScore)",
            "function leaderboard(uint256) external view returns (address player, uint256 score)",
            "function players(address) external view returns (uint256 coinBalance, uint256 streak, uint256 lastClaimTime, uint256 highScore)",
            "function rewards(uint256) external view returns (uint256)",
            "function submitScore(uint256 score) external payable",
            "function withdraw() external"
        ];

        // Bytecode compiled from solc 0.8.20
        const contractBytecode = "0x60806040526040518060e00160405280606461ffff168152602001609661ffff16815260200160c861ffff16815260200160fa61ffff16815260200161012c61ffff16815260200161015e61ffff1681526020016101f461ffff16815250601690600761006d9291906100bf565b50348015610079575f80fd5b503360155f6101000a81548173ffffffffffffffffffffffffffffffffffffffff021916908373ffffffffffffffffffffffffffffffffffffffff160217905550610120565b82600781019282156100f4579160200282015b828111156100f3578251829061ffff169055916020019190600101906100d2565b5b5090506101019190610105565b5090565b5b8082111561011c575f815f905550600101610106565b5090565b6111ce8061012d5f395ff3fe608060405260043610610085575f3560e01c8063aff0b29711610058578063aff0b29714610111578063bf3683991461012d578063c01ca43f1461016a578063e2eb41ff146101a9578063f301af42146101e857610085565b80633ccfd60b146100895780636d763a6e1461009f57806385f2a396146100c95780638da5cb5b146100e7575b5f80fd5b348015610094575f80fd5b5061009d610224565b005b3480156100aa575f80fd5b506100b361031a565b6040516100c09190610d2b565b60405180910390f35b6100d16103c9565b6040516100de9190610d54565b60405180910390f35b3480156100f2575f80fd5b506100fb6105a3565b6040516101089190610d7c565b60405180910390f35b61012b60048036038101906101269190610dc3565b6105c8565b005b348015610138575f80fd5b50610153600480360381019061014e9190610dc3565b6106ca565b604051610161929190610dee565b60405180910390f35b348015610175575f80fd5b50610190600480360381019061018b9190610e3f565b610710565b6040516101a09493929190610e6a565b60405180910390f35b3480156101b4575f80fd5b506101cf60048036038101906101ca9190610e3f565b610776565b6040516101df9493929190610e6a565b60405180910390f35b3480156101f3575f80fd5b5061020e60048036038101906102099190610dc3565b6107a1565b60405161021b9190610d54565b60405180910390f35b60155f9054906101000a900473ffffffffffffffffffffffffffffffffffffffff1673ffffffffffffffffffffffffffffffffffffffff163373ffffffffffffffffffffffffffffffffffffffff16146102b3576040517f08c379a00000000000000000000000000000000000000000000000000000000081526004016102aa90610f07 5b91505092915050565b5f608082019050610e7d5f830187610d45565b610e8a6020830186610d45565b610e976040830185610d45565b610ea46060830184610d45565b95945050505050565b5f82825260208201905092915050565b7f4e6f74206f776e657200000000000000000000000000000000000000000000005f82015250565b5f610ef1600983610ead565b9150610efc82610ebd565b602082019050919050565b5f6020820190508181035f830152610f1e81610ee5565b9050919050565b7f4665653a20302e3030303030332045544820726571756972656420287e302e305f8201527f3120555344290000000000000000000000000000000000000000000000000000602082015250565b5f610f7f602683610ead565b9150610f8a82610f25565b604082019050919050565b5f6020820190508181035f830152610fac81610f73565b9050919050565b7f4e487b71000000000000000000000000000000000000000000000000000000005f52601160045260245ffd5b5f610fea82610c6d565b9150610ff583610c6d565b925082820390508181111561100d5761100c610fb3565b5b92915050565b7f436f6f6c646f776e3a20323420686f75727320726571756972656400000000005f82015250565b5f611047601b83610ead565b915061105282611013565b602082019050919050565b5f6020820190508181035f8301526110748161103b565b9050919050565b5f61108582610c6d565b915061109083610c6d565b92508282019050808211156110a8576110a7610fb3565b5b92915050565b7f4e487b71000000000000000000000000000000000000000000000000000000005f52603260045260245ffd5b5f6060820190506110ee5f830186610d6d565b6110fb6020830185610d45565b6111086040830184610d45565b949350505050565b5f8115159050919050565b61112481611110565b82525050565b5f60408201905061113d5f830185610d45565b61114a602083018461111b565b9392505050565b5f61115b82610c6d565b91507fffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff820361118d5761118c610fb3565b5b60018201905091905056fea264697066735822122020b4ecce1b6bdd1ebd94ae9afd6ee89bfc8f55d6b4b8dd220f8c9bf13d86974664736f6c63430008140033";

        let provider;
        let signer;
        let userAddress;

        const btnConnect = document.getElementById('btn-connect');
        const btnDeploy = document.getElementById('btn-deploy');
        const statusContainer = document.getElementById('status-container');
        const walletAddressSpan = document.getElementById('wallet-address');
        const contractAddressSpan = document.getElementById('contract-address');

        // Check if there's already a saved contract address
        const savedContract = localStorage.getItem('miniguy_contract_address');
        if (savedContract) {
            contractAddressSpan.innerText = savedContract;
            contractAddressSpan.style.color = 'var(--color-success)';
        }

        // Helper to detect modern EIP-1193 injected provider
        function getInjectedProvider() {
            if (typeof window.ethereum === 'undefined') {
                return null;
            }
            // Check for multiple injected providers (e.g. MetaMask + Coinbase Wallet)
            if (window.ethereum.providers && Array.isArray(window.ethereum.providers)) {
                const coinbase = window.ethereum.providers.find(p => p.isCoinbaseWallet);
                const metamask = window.ethereum.providers.find(p => p.isMetaMask);
                return coinbase || metamask || window.ethereum.providers[0];
            }
            return window.ethereum;
        }

        // Connect Wallet using modern EIP-1193 standard
        btnConnect.addEventListener('click', async () => {
            const ethereum = getInjectedProvider();
            if (!ethereum) {
                showStatus("No Web3 wallet found! Please install MetaMask or Coinbase Wallet.", "error");
                return;
            }

            try {
                showStatus("Connecting to wallet...", "pending");
                
                // Request accounts using the EIP-1193 request method
                const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                walletAddressSpan.innerText = `${userAddress.substring(0, 6)}...${userAddress.substring(38)}`;
                walletAddressSpan.style.color = 'var(--color-success)';

                // Initialize Ethers provider using the resolved EIP-1193 provider
                provider = new ethers.BrowserProvider(ethereum);

                // Check chain ID (Base L2 Mainnet is 8453 / 0x2105)
                const network = await provider.getNetwork();
                const chainId = network.chainId;
                
                if (chainId !== 8453n) {
                    showStatus("Switching network to Base Mainnet...", "pending");
                    try {
                        await ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x2105' }],
                        });
                        // Re-fetch provider & network
                        provider = new ethers.BrowserProvider(ethereum);
                    } catch (switchError) {
                        // This error code indicates that the chain has not been added to MetaMask.
                        const isUnrecognized = switchError.code === 4902 || 
                                               (switchError.message && switchError.message.toLowerCase().includes("unrecognized")) ||
                                               switchError.code === -32603;
                        if (isUnrecognized) {
                            try {
                                await ethereum.request({
                                    method: 'wallet_addEthereumChain',
                                    params: [{
                                        chainId: '0x2105',
                                        chainName: 'Base',
                                        nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                                        rpcUrls: ['https://mainnet.base.org'],
                                        blockExplorerUrls: ['https://basescan.org']
                                    }],
                                });
                                provider = new ethers.BrowserProvider(ethereum);
                            } catch (addError) {
                                throw new Error("Could not add Base Mainnet network.");
                            }
                        } else {
                            throw switchError;
                        }
                    }
                }

                signer = await provider.getSigner();
                btnConnect.style.display = 'none';
                btnDeploy.style.display = 'block';
                showStatus("Wallet connected on Base Mainnet!", "success");
            } catch (e) {
                console.error(e);
                showStatus("Wallet connection failed: " + (e.reason || e.message || e), "error");
            }
        });

        // Deploy Contract
        btnDeploy.addEventListener('click', async () => {
            if (!signer) {
                showStatus("Please connect wallet first!", "error");
                return;
            }

            try {
                showStatus("Deploying smart contract to Base Mainnet (Approve transaction)...", "pending");
                btnDeploy.disabled = true;

                const factory = new ethers.ContractFactory(contractABI, contractBytecode, signer);
                
                // Get deployment transaction calldata and append builder code suffix
                const deployTx = await factory.getDeployTransaction();
                deployTx.data = deployTx.data + "62635f736a6b65787032306f0b00802180218021802180218021802180218021";
                
                // Send deployment transaction manually
                const response = await signer.sendTransaction(deployTx);
                showStatus("Deployment transaction sent! Waiting for confirmation...", "pending");
                
                // Wait for transaction to be mined
                const receipt = await response.wait();
                const address = receipt.contractAddress;
                
                contractAddressSpan.innerText = address;
                contractAddressSpan.style.color = 'var(--color-success)';

                // Save to localStorage
                localStorage.setItem('miniguy_contract_address', address);
                
                showStatus("Contract deployed successfully at: " + address, "success");
                btnDeploy.style.display = 'none';
            } catch (e) {
                console.error(e);
                showStatus("Deployment failed: " + (e.reason || e.message || e), "error");
                btnDeploy.disabled = false;
            }
        });

        function showStatus(msg, type) {
            statusContainer.innerText = msg.toUpperCase();
            statusContainer.className = "status-message font-arcade status-" + type;
        }
    </script>
</body>
</html>
